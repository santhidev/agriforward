<!doctype html>
<html lang="th">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>PROTOTYPE: Buyer Create PO — AgriForward</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            /* PROTOTYPE: minimal custom styles only where Tailwind utilities are awkward */
            .wizard-step {
                display: none;
            }
            .wizard-step.active {
                display: block;
                animation: fadeIn 0.2s ease-in-out;
            }
            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(8px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            .debug-panel {
                font-family:
                    ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
                    monospace;
            }
            /* hide scrollbar for dense dashboard feel */
            .no-scrollbar::-webkit-scrollbar {
                display: none;
            }
            .no-scrollbar {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }
        </style>
    </head>
    <body class="bg-gray-50 text-gray-900 min-h-screen pb-24">
        <!-- PROTOTYPE HEADER -->
        <div
            class="bg-yellow-300 text-yellow-900 text-center text-xs font-bold py-1 uppercase tracking-wider"
        >
            PROTOTYPE — Throwaway code. Switch variants with the bar below.
        </div>

        <!-- APP SHELL -->
        <div id="app" class="max-w-6xl mx-auto p-4"></div>

        <!-- FLOATING SWITCHER -->
        <div
            id="switcher"
            class="fixed bottom-4 left-1/2 -translate-x-1/2 z-50 bg-gray-900 text-white rounded-full shadow-lg px-4 py-2 flex items-center gap-3 select-none"
        >
            <button
                id="prevVariant"
                class="w-8 h-8 rounded-full bg-gray-700 hover:bg-gray-600 flex items-center justify-center text-sm"
                aria-label="Previous variant"
            >
                ←
            </button>
            <div class="text-sm font-medium whitespace-nowrap">
                <span id="variantLabel">—</span>
            </div>
            <button
                id="nextVariant"
                class="w-8 h-8 rounded-full bg-gray-700 hover:bg-gray-600 flex items-center justify-center text-sm"
                aria-label="Next variant"
            >
                →
            </button>
        </div>

        <!-- DEBUG PANEL -->
        <div class="fixed top-14 right-4 z-40 w-80 max-w-[90vw]">
            <div
                class="bg-gray-900 text-green-400 text-xs rounded-lg shadow-xl p-3 debug-panel border border-gray-700"
            >
                <div class="flex justify-between items-center mb-2">
                    <span class="font-bold text-gray-300">STATE DUMP</span>
                    <button
                        id="toggleDebug"
                        class="text-gray-500 hover:text-gray-300"
                    >
                        hide
                    </button>
                </div>
                <pre id="stateDump" class="whitespace-pre-wrap break-all"></pre>
            </div>
        </div>

        <script>
            // ==========================
            // PROTOTYPE: BUYER CREATE PO
            // ==========================

            // ---- Mock Data ----
            const CATALOG = {
                vegetables: {
                    name: "ผัก",
                    products: [
                        { id: "tomato", name: "มะเขือเทศ" },
                        { id: "cucumber", name: "แตงกวา" },
                        { id: "chinese_cabbage", name: "ผักกาดขาว" },
                        { id: "long_bean", name: "ถั่วฝักยาว" },
                    ],
                },
                fruits: {
                    name: "ผลไม้",
                    products: [
                        { id: "mango", name: "มะม่วง" },
                        { id: "rambutan", name: "เงาะ" },
                        { id: "durian", name: "ทุเรียน" },
                        { id: "longan", name: "ลำไย" },
                    ],
                },
                grains: {
                    name: "ธัญพืช",
                    products: [
                        { id: "rice", name: "ข้าวเปลือก" },
                        { id: "corn", name: "ข้าวโพด" },
                        { id: "mungbean", name: "ถั่วเขียว" },
                    ],
                },
            };
            const UNITS = [
                { id: "kg", name: "กิโลกรัม" },
                { id: "ton", name: "ตัน" },
                { id: "piece", name: "ลูก" },
                { id: "bunch", name: "กำ" },
            ];

            // ---- State ----
            let state = {
                screen: "buyer-po",
                step: 0,
                category: "",
                product: "",
                quantity: "",
                unit: "kg",
                targetPrice: "",
                deliveryOption: "self_pickup", // 'self_pickup' | 'platform_logistics'
                shippingFee: 0,
            };

            // ---- Variant Control ----
            const VARIANTS = [
                { key: "minimal", label: "Minimal / Wizard" },
                { key: "dense", label: "Dense / Dashboard" },
                { key: "card", label: "Card / Conversational" },
            ];

            function getCurrentVariant() {
                const params = new URLSearchParams(window.location.search);
                const v = params.get("v");
                return VARIANTS.find((x) => x.key === v) ? v : "minimal";
            }

            function setVariant(key) {
                const url = new URL(window.location.href);
                url.searchParams.set("v", key);
                window.history.replaceState({}, "", url);
                render();
            }

            function cycleVariant(dir) {
                const keys = VARIANTS.map((v) => v.key);
                const idx = keys.indexOf(getCurrentVariant());
                const next = keys[(idx + dir + keys.length) % keys.length];
                setVariant(next);
            }

            // ---- State Actions ----
            function setCategory(cat) {
                state.category = cat;
                state.product = "";
                state.step = 1;
                updateShipping();
                render();
            }
            function setProduct(prod) {
                state.product = prod;
                state.step = 2;
                render();
            }
            function setQuantity(q) {
                state.quantity = q;
                updateShipping();
                render();
            }
            function setUnit(u) {
                state.unit = u;
                updateShipping();
                render();
            }
            function setTargetPrice(p) {
                state.targetPrice = p;
                render();
            }
            function setDeliveryOption(opt) {
                state.deliveryOption = opt;
                updateShipping();
                render();
            }
            function nextStep() {
                state.step = Math.min(state.step + 1, 5);
                render();
            }
            function updateShipping() {
                if (state.deliveryOption === "self_pickup") {
                    state.shippingFee = 0;
                    return;
                }
                const qty = parseFloat(state.quantity) || 0;
                const base = 150;
                const perKg = 2;
                state.shippingFee =
                    qty > 0 ? Math.round(base + qty * perKg) : 0;
            }

            // ---- Utility ----
            function fmtNum(n) {
                if (n === "" || n === null || n === undefined) return "-";
                const num = Number(n);
                return isNaN(num) ? String(n) : num.toLocaleString("th-TH");
            }

            function getProductName() {
                const cat = CATALOG[state.category];
                if (!cat) return "-";
                const p = cat.products.find((x) => x.id === state.product);
                return p ? p.name : "-";
            }

            function getUnitName() {
                return (
                    UNITS.find((u) => u.id === state.unit)?.name || state.unit
                );
            }

            // ---- Renderers ----
            function renderSwitcher() {
                const v = getCurrentVariant();
                const info = VARIANTS.find((x) => x.key === v);
                document.getElementById("variantLabel").textContent =
                    `${v} — ${info.label}`;
            }

            function renderDebug() {
                const payload = {
                    ...state,
                    productName: getProductName(),
                    unitName: getUnitName(),
                    timestamp: new Date().toISOString(),
                };
                document.getElementById("stateDump").textContent =
                    JSON.stringify(payload, null, 2);
            }

            // ---- Variants ----

            // 1. Minimal / Wizard
            function renderMinimal() {
                const steps = [
                    {
                        id: "category",
                        title: "เลือกหมวดหมู่สินค้า",
                        subtitle: "เริ่มต้นด้วยหมวดหมู่ที่คุณต้องการสั่งซื้อ",
                    },
                    {
                        id: "product",
                        title: "เลือกสินค้า",
                        subtitle: "เลือกสินค้าจากหมวดหมู่ที่คุณเลือก",
                    },
                    {
                        id: "quantity",
                        title: "ระบุจำนวน",
                        subtitle: "คุณต้องการสั่งซื้อเท่าไหร่?",
                    },
                    {
                        id: "price",
                        title: "ราคาเป้าหมาย (ไม่บังคับ)",
                        subtitle: "ใส่ราคาที่คุณต้องการ หรือข้ามได้",
                    },
                    {
                        id: "delivery",
                        title: "เลือกวิธีรับสินค้า",
                        subtitle: "มารับเองฟรี หรือให้เราส่งถึงที่",
                    },
                    {
                        id: "review",
                        title: "ตรวจสอบคำสั่งซื้อ",
                        subtitle: "ตรวจสอบรายละเอียดก่อนยืนยัน",
                    },
                ];

                // Use explicit step tracker for wizard
                let active = state.step;

                const stepDots = steps
                    .map(
                        (s, i) =>
                            `<div class="h-2 w-2 rounded-full ${i === active ? "bg-green-600" : i < active ? "bg-green-300" : "bg-gray-300"}"></div>`,
                    )
                    .join("");

                function stepContent(idx) {
                    if (idx === 0) {
                        return `<div class="grid grid-cols-1 gap-3 mt-6">
          ${Object.entries(CATALOG)
              .map(
                  ([k, v]) => `
            <button onclick="setCategory('${k}')" class="text-left px-6 py-5 rounded-xl border-2 transition ${state.category === k ? "border-green-600 bg-green-50" : "border-gray-200 hover:border-green-300"}">
              <div class="text-lg font-semibold">${v.name}</div>
            </button>
          `,
              )
              .join("")}
        </div>`;
                    }
                    if (idx === 1) {
                        const cat = CATALOG[state.category];
                        if (!cat)
                            return `<p class="text-gray-500 mt-6">กรุณาเลือกหมวดหมู่ก่อน</p>`;
                        return `<div class="grid grid-cols-1 gap-3 mt-6">
          ${cat.products
              .map(
                  (p) => `
            <button onclick="setProduct('${p.id}')" class="text-left px-6 py-5 rounded-xl border-2 transition ${state.product === p.id ? "border-green-600 bg-green-50" : "border-gray-200 hover:border-green-300"}">
              <div class="text-lg font-semibold">${p.name}</div>
            </button>
          `,
              )
              .join("")}
        </div>`;
                    }
                    if (idx === 2) {
                        return `<div class="mt-6">
          <div class="flex gap-3">
            <input type="number" value="${state.quantity}" oninput="setQuantity(this.value)" placeholder="จำนวน" class="flex-1 px-4 py-4 rounded-xl border-2 border-gray-200 text-lg focus:border-green-500 outline-none" />
            <select onchange="setUnit(this.value)" class="px-4 py-4 rounded-xl border-2 border-gray-200 text-lg bg-white focus:border-green-500 outline-none">
              ${UNITS.map((u) => `<option value="${u.id}" ${state.unit === u.id ? "selected" : ""}>${u.name}</option>`).join("")}
            </select>
          </div>
        </div>`;
                    }
                    if (idx === 3) {
                        return `<div class="mt-6">
          <input type="number" value="${state.targetPrice}" oninput="setTargetPrice(this.value)" placeholder="เช่น 25" class="w-full px-4 py-4 rounded-xl border-2 border-gray-200 text-lg focus:border-green-500 outline-none" />
          <p class="text-sm text-gray-500 mt-2">บาทต่อหน่วย — ไม่บังคับ</p>
          <div class="mt-6 flex justify-end">
            <button onclick="nextStep()" class="px-6 py-3 bg-green-600 text-white rounded-xl font-semibold">ถัดไป</button>
          </div>
        </div>`;
                    }
                    if (idx === 4) {
                        return `<div class="mt-6 space-y-3">
          <button onclick="setDeliveryOption('self_pickup')" class="w-full text-left px-6 py-5 rounded-xl border-2 transition ${state.deliveryOption === "self_pickup" ? "border-green-600 bg-green-50" : "border-gray-200 hover:border-green-300"}">
            <div class="font-semibold text-lg">มารับที่ Hub</div>
            <div class="text-green-700 font-bold mt-1">ฟรี</div>
            <div class="text-sm text-gray-500 mt-1">แพลตฟอร์มตรวจสอบที่ Hub แล้วคุณมารับเอง</div>
          </button>
          <button onclick="setDeliveryOption('platform_logistics')" class="w-full text-left px-6 py-5 rounded-xl border-2 transition ${state.deliveryOption === "platform_logistics" ? "border-green-600 bg-green-50" : "border-gray-200 hover:border-green-300"}">
            <div class="font-semibold text-lg">ส่งถึงบ้าน</div>
            <div class="text-gray-700 mt-1">ค่าส่งประมาณ <span class="font-bold">${fmtNum(state.shippingFee)} บาท</span></div>
            <div class="text-sm text-gray-500 mt-1">เรารับจากผู้ขาย → ตรวจที่ Hub → ส่งถึงคุณ</div>
          </button>
          <div class="mt-4 p-3 bg-blue-50 text-blue-800 text-sm rounded-lg">ใช้แพลตฟอร์มฟรี — จ่ายเฉพาะถ้าอยากให้เราส่ง</div>
          <div class="mt-4 flex justify-end">
            <button onclick="nextStep()" class="px-6 py-3 bg-green-600 text-white rounded-xl font-semibold">ถัดไป</button>
          </div>
        </div>`;
                    }
                    if (idx === 5) {
                        return `<div class="mt-6 space-y-3">
          <div class="bg-white rounded-xl border border-gray-200 p-4">
            <div class="text-sm text-gray-500">สินค้า</div>
            <div class="font-semibold">${getProductName()}</div>
            <div class="text-sm text-gray-500 mt-2">จำนวน</div>
            <div class="font-semibold">${fmtNum(state.quantity)} ${getUnitName()}</div>
            <div class="text-sm text-gray-500 mt-2">ราคาเป้าหมาย</div>
            <div class="font-semibold">${state.targetPrice ? fmtNum(state.targetPrice) + " บาท/" + getUnitName() : "ไม่ระบุ"}</div>
            <div class="text-sm text-gray-500 mt-2">วิธีรับสินค้า</div>
            <div class="font-semibold">${state.deliveryOption === "self_pickup" ? "มารับที่ Hub (ฟรี)" : "ส่งถึงบ้าน (" + fmtNum(state.shippingFee) + " บาท)"}</div>
          </div>
          <button onclick="nextStep()" class="w-full py-4 bg-green-600 text-white rounded-xl font-bold text-lg">สร้างคำสั่งซื้อ</button>
        </div>`;
                    }
                    return "";
                }

                return `
      <div class="max-w-md mx-auto pt-10">
        <div class="flex items-center justify-between mb-8">
          <h1 class="text-2xl font-bold">สร้างคำสั่งซื้อ</h1>
          <a href="seller-offer.html?v=${getCurrentVariant()}" class="text-sm text-green-700 underline">ไปหน้าผู้ขาย →</a>
        </div>
        <div class="flex gap-2 mb-6">${stepDots}</div>
        <div>
          <div class="text-sm font-bold text-green-700 uppercase tracking-wide">ขั้นตอน ${active + 1} / ${steps.length}</div>
          <h2 class="text-xl font-bold mt-1">${steps[active].title}</h2>
          <p class="text-gray-500">${steps[active].subtitle}</p>
          <div class="wizard-step active">${stepContent(active)}</div>
        </div>
      </div>
    `;
            }

            // 2. Dense / Dashboard
            function renderDense() {
                const cat = CATALOG[state.category];
                return `
      <div class="pt-4">
        <div class="flex items-center justify-between mb-4">
          <h1 class="text-xl font-bold">สร้างคำสั่งซื้อ</h1>
          <a href="seller-offer.html?v=${getCurrentVariant()}" class="text-sm text-green-700 underline">ไปหน้าผู้ขาย →</a>
        </div>

        <div class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden">
          <table class="w-full text-sm">
            <thead class="bg-gray-100 text-gray-600 uppercase text-xs">
              <tr>
                <th class="px-4 py-3 text-left">ฟิลด์</th>
                <th class="px-4 py-3 text-left">ค่า</th>
                <th class="px-4 py-3 text-left">หมายเหตุ</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
              <tr>
                <td class="px-4 py-3 font-medium">หมวดหมู่</td>
                <td class="px-4 py-3">
                  <select onchange="setCategory(this.value)" class="border border-gray-300 rounded px-2 py-1 text-sm w-full">
                    <option value="">-- เลือก --</option>
                    ${Object.entries(CATALOG)
                        .map(
                            ([k, v]) =>
                                `<option value="${k}" ${state.category === k ? "selected" : ""}>${v.name}</option>`,
                        )
                        .join("")}
                  </select>
                </td>
                <td class="px-4 py-3 text-gray-500">เลือกหมวดหมู่หลัก</td>
              </tr>
              <tr>
                <td class="px-4 py-3 font-medium">สินค้า</td>
                <td class="px-4 py-3">
                  <select onchange="setProduct(this.value)" class="border border-gray-300 rounded px-2 py-1 text-sm w-full" ${!cat ? "disabled" : ""}>
                    <option value="">-- เลือก --</option>
                    ${cat ? cat.products.map((p) => `<option value="${p.id}" ${state.product === p.id ? "selected" : ""}>${p.name}</option>`).join("") : ""}
                  </select>
                </td>
                <td class="px-4 py-3 text-gray-500">ระดับรองจากหมวดหมู่</td>
              </tr>
              <tr>
                <td class="px-4 py-3 font-medium">จำนวน</td>
                <td class="px-4 py-3">
                  <div class="flex gap-2">
                    <input type="number" value="${state.quantity}" oninput="setQuantity(this.value)" class="border border-gray-300 rounded px-2 py-1 text-sm w-24" />
                    <select onchange="setUnit(this.value)" class="border border-gray-300 rounded px-2 py-1 text-sm">
                      ${UNITS.map((u) => `<option value="${u.id}" ${state.unit === u.id ? "selected" : ""}>${u.name}</option>`).join("")}
                    </select>
                  </div>
                </td>
                <td class="px-4 py-3 text-gray-500"></td>
              </tr>
              <tr>
                <td class="px-4 py-3 font-medium">ราคาเป้าหมาย</td>
                <td class="px-4 py-3">
                  <input type="number" value="${state.targetPrice}" oninput="setTargetPrice(this.value)" placeholder="บาท/หน่วย" class="border border-gray-300 rounded px-2 py-1 text-sm w-full" />
                </td>
                <td class="px-4 py-3 text-gray-500">ไม่บังคับ</td>
              </tr>
              <tr class="bg-yellow-50">
                <td class="px-4 py-3 font-bold">วิธีรับสินค้า</td>
                <td class="px-4 py-3">
                  <label class="flex items-center gap-2 mb-1 cursor-pointer">
                    <input type="radio" name="delivery" onchange="setDeliveryOption('self_pickup')" ${state.deliveryOption === "self_pickup" ? "checked" : ""} />
                    <span class="text-sm">มารับที่ Hub — <span class="font-bold text-green-700">ฟรี</span></span>
                  </label>
                  <label class="flex items-center gap-2 cursor-pointer">
                    <input type="radio" name="delivery" onchange="setDeliveryOption('platform_logistics')" ${state.deliveryOption === "platform_logistics" ? "checked" : ""} />
                    <span class="text-sm">ส่งถึงบ้าน — ค่าส่ง ${fmtNum(state.shippingFee)} บาท</span>
                  </label>
                </td>
                <td class="px-4 py-3 text-gray-500">
                  <div class="text-xs bg-blue-50 text-blue-800 px-2 py-1 rounded inline-block">ใช้แพลตฟอร์มฟรี — จ่ายเฉพาะถ้าอยากให้เราส่ง</div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="mt-4 flex justify-end">
          <button class="px-6 py-2 bg-green-600 text-white rounded font-semibold text-sm hover:bg-green-700">สร้างคำสั่งซื้อ</button>
        </div>
      </div>
    `;
            }

            // 3. Card / Conversational
            function renderCard() {
                const cat = CATALOG[state.category];
                return `
      <div class="max-w-lg mx-auto pt-6">
        <div class="flex items-center justify-between mb-6">
          <h1 class="text-lg font-bold text-gray-800">สร้างคำสั่งซื้อ</h1>
          <a href="seller-offer.html?v=${getCurrentVariant()}" class="text-sm text-green-700 underline">ไปหน้าผู้ขาย →</a>
        </div>

        <!-- Chat bubble style -->
        <div class="space-y-4">
          <div class="flex gap-3">
            <div class="w-8 h-8 rounded-full bg-green-100 text-green-700 flex items-center justify-center text-xs font-bold shrink-0">AF</div>
            <div class="bg-white border border-gray-200 rounded-2xl rounded-tl-none px-4 py-3 shadow-sm max-w-[80%]">
              <p class="text-sm">สวัสดี! วันนี้คุณอยากสั่งซื้ออะไรครับ? 😊</p>
            </div>
          </div>

          ${
              state.category
                  ? `
          <div class="flex gap-3 justify-end">
            <div class="bg-green-600 text-white rounded-2xl rounded-tr-none px-4 py-3 shadow-sm max-w-[80%]">
              <p class="text-sm">หมวดหมู่: ${CATALOG[state.category].name}</p>
            </div>
          </div>
          `
                  : ""
          }

          <div class="flex gap-3">
            <div class="w-8 h-8 rounded-full bg-green-100 text-green-700 flex items-center justify-center text-xs font-bold shrink-0">AF</div>
            <div class="bg-white border border-gray-200 rounded-2xl rounded-tl-none px-4 py-3 shadow-sm max-w-[90%] w-full">
              <p class="text-sm mb-2">เลือกหมวดหมู่ก่อนเลยครับ</p>
              <div class="flex flex-wrap gap-2">
                ${Object.entries(CATALOG)
                    .map(
                        ([k, v]) => `
                  <button onclick="setCategory('${k}')" class="px-3 py-1.5 rounded-full text-sm border ${state.category === k ? "bg-green-600 text-white border-green-600" : "bg-white text-gray-700 border-gray-300"}">${v.name}</button>
                `,
                    )
                    .join("")}
              </div>
            </div>
          </div>

          ${
              state.category
                  ? `
          <div class="flex gap-3">
            <div class="w-8 h-8 rounded-full bg-green-100 text-green-700 flex items-center justify-center text-xs font-bold shrink-0">AF</div>
            <div class="bg-white border border-gray-200 rounded-2xl rounded-tl-none px-4 py-3 shadow-sm max-w-[90%] w-full">
              <p class="text-sm mb-2">เลือกสินค้าครับ</p>
              <div class="grid grid-cols-2 gap-2">
                ${cat.products
                    .map(
                        (p) => `
                  <button onclick="setProduct('${p.id}')" class="px-3 py-2 rounded-xl text-sm border text-left ${state.product === p.id ? "bg-green-50 border-green-600 text-green-800" : "bg-white border-gray-200 text-gray-700"}">${p.name}</button>
                `,
                    )
                    .join("")}
              </div>
            </div>
          </div>
          `
                  : ""
          }

          ${
              state.product
                  ? `
          <div class="flex gap-3 justify-end">
            <div class="bg-green-600 text-white rounded-2xl rounded-tr-none px-4 py-3 shadow-sm max-w-[80%]">
              <p class="text-sm">สินค้า: ${getProductName()}</p>
            </div>
          </div>

          <div class="flex gap-3">
            <div class="w-8 h-8 rounded-full bg-green-100 text-green-700 flex items-center justify-center text-xs font-bold shrink-0">AF</div>
            <div class="bg-white border border-gray-200 rounded-2xl rounded-tl-none px-4 py-3 shadow-sm max-w-[90%] w-full">
              <p class="text-sm mb-2">ต้องการกี่ ${getUnitName()} ครับ?</p>
              <div class="flex gap-2">
                <input type="number" value="${state.quantity}" oninput="setQuantity(this.value)" class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-green-500 outline-none" placeholder="ใส่จำนวน" />
                <select onchange="setUnit(this.value)" class="border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white">
                  ${UNITS.map((u) => `<option value="${u.id}" ${state.unit === u.id ? "selected" : ""}>${u.name}</option>`).join("")}
                </select>
              </div>
            </div>
          </div>
          `
                  : ""
          }

          ${
              state.quantity
                  ? `
          <div class="flex gap-3">
            <div class="w-8 h-8 rounded-full bg-green-100 text-green-700 flex items-center justify-center text-xs font-bold shrink-0">AF</div>
            <div class="bg-white border border-gray-200 rounded-2xl rounded-tl-none px-4 py-3 shadow-sm max-w-[90%] w-full">
              <p class="text-sm mb-2">มีราคาเป้าหมายไหมครับ? (ไม่บังคับ)</p>
              <input type="number" value="${state.targetPrice}" oninput="setTargetPrice(this.value)" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-green-500 outline-none" placeholder="บาทต่อหน่วย" />
            </div>
          </div>
          `
                  : ""
          }

          ${
              state.quantity
                  ? `
          <div class="flex gap-3">
            <div class="w-8 h-8 rounded-full bg-green-100 text-green-700 flex items-center justify-center text-xs font-bold shrink-0">AF</div>
            <div class="bg-white border border-gray-200 rounded-2xl rounded-tl-none px-4 py-3 shadow-sm max-w-[90%] w-full">
              <p class="text-sm mb-2">เลือกวิธีรับสินค้าครับ 🚚</p>
              <div class="space-y-2">
                <button onclick="setDeliveryOption('self_pickup')" class="w-full text-left px-4 py-3 rounded-xl border-2 transition flex items-start gap-3 ${state.deliveryOption === "self_pickup" ? "border-green-600 bg-green-50" : "border-gray-200"}">
                  <div class="w-5 h-5 rounded-full border-2 flex items-center justify-center mt-0.5 ${state.deliveryOption === "self_pickup" ? "border-green-600" : "border-gray-300"}">
                    ${state.deliveryOption === "self_pickup" ? '<div class="w-2.5 h-2.5 rounded-full bg-green-600"></div>' : ""}
                  </div>
                  <div>
                    <div class="font-semibold text-sm">มารับที่ Hub</div>
                    <div class="text-green-700 font-bold text-sm">ฟรี</div>
                    <div class="text-xs text-gray-500">ตรวจสอบที่ Hub แล้วคุณมารับเอง</div>
                  </div>
                </button>
                <button onclick="setDeliveryOption('platform_logistics')" class="w-full text-left px-4 py-3 rounded-xl border-2 transition flex items-start gap-3 ${state.deliveryOption === "platform_logistics" ? "border-green-600 bg-green-50" : "border-gray-200"}">
                  <div class="w-5 h-5 rounded-full border-2 flex items-center justify-center mt-0.5 ${state.deliveryOption === "platform_logistics" ? "border-green-600" : "border-gray-300"}">
                    ${state.deliveryOption === "platform_logistics" ? '<div class="w-2.5 h-2.5 rounded-full bg-green-600"></div>' : ""}
                  </div>
                  <div>
                    <div class="font-semibold text-sm">ส่งถึงบ้าน</div>
                    <div class="text-gray-700 text-sm">ค่าส่งประมาณ <span class="font-bold">${fmtNum(state.shippingFee)} บาท</span></div>
                    <div class="text-xs text-gray-500">รับจากผู้ขาย → ตรวจที่ Hub → ส่งถึงคุณ</div>
                  </div>
                </button>
              </div>
              <div class="mt-3 p-2 bg-blue-50 text-blue-800 text-xs rounded-lg">💡 ใช้แพลตฟอร์มฟรี — จ่ายเฉพาะถ้าอยากให้เราส่ง</div>
            </div>
          </div>
          `
                  : ""
          }

          ${
              state.deliveryOption && state.quantity
                  ? `
          <div class="flex gap-3 justify-end">
            <button class="px-6 py-3 bg-green-600 text-white rounded-full font-semibold text-sm shadow-md">สร้างคำสั่งซื้อ →</button>
          </div>
          `
                  : ""
          }
        </div>
      </div>
    `;
            }

            // ---- Main Render ----
            function render() {
                const variant = getCurrentVariant();
                const app = document.getElementById("app");
                if (variant === "minimal") app.innerHTML = renderMinimal();
                else if (variant === "dense") app.innerHTML = renderDense();
                else if (variant === "card") app.innerHTML = renderCard();
                else app.innerHTML = renderMinimal();
                renderSwitcher();
                renderDebug();
            }

            // ---- Event Wiring ----
            document
                .getElementById("prevVariant")
                .addEventListener("click", () => cycleVariant(-1));
            document
                .getElementById("nextVariant")
                .addEventListener("click", () => cycleVariant(1));

            let debugVisible = true;
            document
                .getElementById("toggleDebug")
                .addEventListener("click", () => {
                    debugVisible = !debugVisible;
                    document.getElementById(
                        "stateDump",
                    ).parentElement.style.display = debugVisible
                        ? "block"
                        : "none";
                    document.getElementById("toggleDebug").textContent =
                        debugVisible ? "hide" : "show";
                });

            document.addEventListener("keydown", (e) => {
                const active = document.activeElement;
                const isTyping =
                    active &&
                    (active.tagName === "INPUT" ||
                        active.tagName === "TEXTAREA" ||
                        active.isContentEditable);
                if (isTyping) return;
                if (e.key === "ArrowLeft") {
                    e.preventDefault();
                    cycleVariant(-1);
                }
                if (e.key === "ArrowRight") {
                    e.preventDefault();
                    cycleVariant(1);
                }
            });

            // Initialize
            setCategory("vegetables"); // pre-select for nicer first paint
            setProduct("tomato");
            setQuantity("500");
            setTargetPrice("25");
            state.step = 0; // reset wizard to first step after prefill
            render();
        </script>
    </body>
</html>
