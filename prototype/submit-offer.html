<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ขายเท่าที่อยู่ใน | AgriForward</title><link rel="stylesheet" href="./css/styles.css"></head><body><nav class="navbar"><div class="container"><a class="brand" href="products.html">AgriForward</a><button class="nav-toggle" aria-label="เมนู">&#9776;</button><ul class="nav-links"><li><a href="products.html">🌿 สินค้า</a></li><li><a href="orders.html">📋 งานของฉัน</a></li><li><a href="notifications.html">🔔 ข่าวสาร</a></li><li><a href="profile.html">👤 ฉัน</a></li></ul></div></nav><main class="main"><div class="container"><h1 style="font-size:1.5rem">💰 ขายเท่าที่อยู่ใน</h1><div class="card" style="background:#f8fafc;text-align:center;margin-bottom:1rem"><div style="font-size:1.1rem;font-weight:700">🍇 องุ่น</div><div style="color:var(--muted);margin-top:.25rem">ไม่รับขาย <strong style="color:var(--primary)">50 กก.</strong></div><div style="color:var(--muted);margin-top:.15rem">ราคาสูงสุดไม่รับขาย <strong style="color:var(--primary)">120 บาท/กก.</strong></div></div><div class="card simple-form"><div class="form-group"><label class="form-label" style="font-size:1.1rem;font-weight:700;text-align:center;display:block">ขายกิโลกรัมละกี่บาท?</label><input type="number" class="form-input" id="priceInput" placeholder="เช่น 110" oninput="calcTotal()" style="font-size:1.5rem;text-align:center;font-weight:700"></div></div><div style="text-align:center;margin-top:1rem"><div style="color:var(--muted);font-size:.9rem">ไม่รับรวมทั้งหมด</div><div class="price-lg" id="totalDisplay">0 บาท</div><div id="depositLine" style="display:none;color:var(--muted);font-size:.85rem;margin-top:.25rem">ชำระมัดจำ: <span id="depositDisplay">0 บาท</span> (เรียกเก็บจากผู้ขาย)</div></div><a href="orders.html" style="display:block;padding:1rem;text-align:center;background:#16a34a;color:#fff;font-size:1.25rem;font-weight:700;border-radius:var(--radius);text-decoration:none;margin-top:1.25rem">✅ ยืนยันขาย</a><script>function calcTotal(){var p=parseFloat(document.getElementById("priceInput").value)||0;var t=p*50;var d=t*0.05;if(d>1000)d=1000;if(p>0){document.getElementById("totalDisplay").textContent=t.toLocaleString()+" บาท";document.getElementById("depositLine").style.display="block";document.getElementById("depositDisplay").textContent=d.toLocaleString()+" บาท";}else{document.getElementById("totalDisplay").textContent="0 บาท";document.getElementById("depositLine").style.display="none";}}</script></div></main><footer class="footer"><div class="container"><p>&copy; 2026 AgriForward | <a href="help.html">ช่วยเหลือ</a> | <a href="terms.html">เงื่อนไข</a> | <a href="privacy.html">ความเป็นส่วนตัว</a></p></div></footer></body></html>
